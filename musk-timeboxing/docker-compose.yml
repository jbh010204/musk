services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: musk-timeboxing-dev
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
